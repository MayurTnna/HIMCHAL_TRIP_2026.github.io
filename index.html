    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f5f4f0;
        color: #1a1a1a;
        min-height: 100vh;
        padding: 2rem 1rem;
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 1.5rem;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .tab {
        padding: 7px 18px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        background: #fff;
        color: #555;
        transition: all 0.15s;
      }
      .tab:hover {
        border-color: #aaa;
      }
      .tab.active {
        background: #1a1a1a;
        color: #fff;
        border-color: #1a1a1a;
        font-weight: 500;
      }
      .section {
        display: none;
      }
      .section.active {
        display: block;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 1rem;
      }
      @media (max-width: 500px) {
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 1rem 1.25rem;
        border: 1px solid #e8e8e8;
      }
      .card .name {
        font-size: 13px;
        color: #888;
        margin-bottom: 4px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .card .amount {
        font-size: 22px;
        font-weight: 600;
      }
      .card .sub {
        font-size: 12px;
        color: #999;
        margin-top: 4px;
      }
      .card .net {
        font-size: 12px;
        margin-top: 6px;
        font-weight: 500;
      }
      .total-card {
        background: #1a1a1a;
        color: #fff;
        border-radius: 12px;
        padding: 1rem 1.25rem;
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .total-card .label {
        font-size: 14px;
        color: #aaa;
      }
      .total-card .amount {
        font-size: 24px;
        font-weight: 600;
      }
      .settle-card {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 12px;
        padding: 1rem 1.25rem;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .settle-row {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        font-weight: 500;
      }
      .arrow {
        color: #bbb;
        font-size: 18px;
      }
      .amount-badge {
        font-weight: 600;
        background: #eef6ff;
        color: #1a5fc4;
        padding: 4px 12px;
        border-radius: 8px;
        font-size: 15px;
      }
      h2 {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e8e8e8;
      }
      th {
        text-align: left;
        padding: 10px 12px;
        color: #888;
        font-weight: 600;
        border-bottom: 1px solid #f0f0f0;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: #fafafa;

      td {

      function calcTotals() {
        let paid = { H: 0, D: 0, M: 0 };
        let share = { H: 0, D: 0, M: 0 };
        expenses.forEach((e) => {
          paid[e.who] += e.amt;
          Object.entries(e.split).forEach(
            ([p, v]) => (share[p] = (share[p] || 0) + v),
          );
        });
        return { paid, share };
      }

      function renderSummary() {
        const { paid, share } = calcTotals();
        const total = paid.H + paid.D + paid.M;
        document.getElementById("total-amount").textContent =
          "₹" + total.toFixed(2);
        const labels = { H: "h", D: "d", M: "m" };
        ["H", "D", "M"].forEach((p) => {
          const k = labels[p];
          document.getElementById(k + "-paid").textContent =
            "₹" + paid[p].toFixed(2);
          document.getElementById(k + "-share").textContent =
            "Share: ₹" + share[p].toFixed(2);
          const net = paid[p] - share[p];
          const el = document.getElementById(k + "-net");
          el.textContent =
            net >= 0
              ? "↑ Overpaid ₹" + net.toFixed(2)
              : "↓ Owes ₹" + Math.abs(net).toFixed(2);
          el.style.color = net >= 0 ? "#1a7a44" : "#c0392b";
        });
      }

      function renderSettle() {
        const { paid, share } = calcTotals();
        let balances = {
          H: paid.H - share.H,
          D: paid.D - share.D,
          M: paid.M - share.M,
        };
        let creditors = [],
          debtors = [];
        Object.entries(balances).forEach(([p, b]) => {
          if (b > 0.01) creditors.push({ p, b });
          else if (b < -0.01) debtors.push({ p, b: -b });
        });
        creditors.sort((a, b) => b.b - a.b);
        debtors.sort((a, b) => b.b - a.b);
        const names = { H: "Harsh", D: "Deep", M: "Mayur" };
        let html = "";
        let c = creditors.map((x) => ({ ...x })),
          d = debtors.map((x) => ({ ...x }));
        let ci = 0,
          di = 0;
        while (ci < c.length && di < d.length) {
          let amt = Math.min(c[ci].b, d[di].b);
          html += `<div class="settle-card">
      <div class="settle-row">
        <span>${names[d[di].p]}</span>
        <span class="arrow">→</span>
        <span>${names[c[ci].p]}</span>
      </div>
      <span class="amount-badge">₹${amt.toFixed(2)}</span>
    </div>`;
          c[ci].b -= amt;
          d[di].b -= amt;
          if (c[ci].b < 0.01) ci++;
          if (d[di].b < 0.01) di++;
        }
        document.getElementById("settle-content").innerHTML = html;
      }

      function renderLog() {
        const names = { H: "Harsh", D: "Deep", M: "Mayur" };
        let html = "";
        let lastDate = "";
        expenses.forEach((e) => {
          if (e.date !== lastDate) {
            html += `<tr class="date-row"><td colspan="4">${e.date}</td></tr>`;
            lastDate = e.date;
          }
          const splitStr = Object.entries(e.split)
            .map(
              ([p, v]) =>
                `<span class="split-tag tag-${p.toLowerCase()}">${names[p]}: ₹${v.toFixed(0)}</span>`,
            )
            .join("");
          html += `<tr>
      <td class="who-${e.who.toLowerCase()}">${names[e.who]}</td>
      <td>${e.desc}</td>
      <td>₹${e.amt.toFixed(2)}</td>
      <td>${splitStr}</td>
    </tr>`;
        });
        document.getElementById("log-body").innerHTML = html;
      }

      function showTab(id) {
        document
          .querySelectorAll(".tab")
          .forEach((t, i) =>
            t.classList.toggle(
              "active",
              ["summary", "settle", "log"][i] === id,
            ),
          );
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.toggle("active", s.id === id));
      }

      renderSummary();
      renderSettle();
      renderLog();
